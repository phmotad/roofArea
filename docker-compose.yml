services:
  db:
    image: postgis/postgis:16-3.4
    container_name: roof-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roof_db
    volumes:
      - roof-db-data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roof_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: roof-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/roof_db
      DATABASE_SYNC_URL: postgresql://postgres:postgres@db:5432/roof_db
      LIDAR_DGT_PATH: /app/lidar
      LIDAR_PNOA_PATH: /app/lidar
      SEGMENTATION_MODEL_PATH: /app/models/deeplabv3_roof_multiclass.pt
      SEGMENTATION_LINES_MODEL_PATH: /app/models/unet_lines.pt
      CACHE_TTL_SECONDS: "0"
    volumes:
      - ./lidar:/app/lidar:ro
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  roof-db-data:
